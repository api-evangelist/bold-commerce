  description: Create, retrieve, update, pause, cancel, and reactivate subscriptions;
    manage line items, intervals, discount codes, shipping addresses, orders
    (skip / unskip), and adjustments. Powers custom subscription rules,
    integrations, reporting, and branded customer portals.
- aid: bold-commerce:bold-commerce-checkout-api
  name: Bold Checkout API
  tags:
  - Checkout
  - Headless
  - Orders
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.boldcommerce.com/api/checkout
  baseURL: https://api.boldcommerce.com/checkout/storefront
