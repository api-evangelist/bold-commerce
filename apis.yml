  - url: openapi/bold-commerce-openapi.yml
    type: OpenAPI
  - url: collections/bold-commerce.postman_collection.json
    type: PostmanCollection
  - url: collections/bold-commerce.opencollection.json
    type: OpenCollection
  description: Create and manage discounts, promotions, and dynamic pricing through
    rulesets and rules, order conditions, bulk activate / deactivate operations,
    a storefront ruleset lookup, and a process endpoint that returns the final
    price for a line item in a cart. Scopes include read_price_rulesets and
    write_price_rulesets.
