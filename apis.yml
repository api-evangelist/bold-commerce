aid: bold-commerce
url: https://raw.githubusercontent.com/api-evangelist/bold-commerce/refs/heads/main/apis.yml
name: Bold Commerce
kind: company
description: Bold Commerce builds modular e-commerce apps and headless commerce APIs
  for subscriptions, checkout, and pricing. Merchants and developers integrate Bold
  Subscriptions (recurring orders and branded customer portals), Bold Checkout
  (a headless, fully customizable checkout across Frontend, Backend, and Admin
  surfaces), and Bold Price Rules (discounts, promotions, and dynamic pricing),
  alongside supporting Products, Customers, and Shops APIs. Requests are made
  against api.boldcommerce.com and authenticated with an OAuth 2.0 access token
  (public integrations) or a scoped API access token (private integrations),
  passed as a Bearer token.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- E-Commerce
- Subscriptions
- Checkout
- Pricing
- Headless Commerce
- Shopify
created: '2026-07-10'
modified: '2026-07-10'
specificationVersion: '0.19'
apis:
- aid: bold-commerce:bold-commerce-subscriptions-api
  name: Bold Subscriptions API
  tags:
  - Subscriptions
  - Recurring Orders
  - Customer Portal
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.boldcommerce.com/api/subscriptions
