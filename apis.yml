  - url: openapi/bold-commerce-openapi.yml
    type: OpenAPI
  - url: collections/bold-commerce.postman_collection.json
    type: PostmanCollection
  - url: collections/bold-commerce.opencollection.json
    type: OpenCollection
  description: Headless storefront checkout - manage shipping and billing addresses,
    line items, discounts, shipping lines, taxes, customers, and payments against
    an order, returning full order and application_state context. A JWT scopes
    each order session on the storefront surface.
- aid: bold-commerce:bold-commerce-price-rules-api
