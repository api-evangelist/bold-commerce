description: >-
  FinOps view of Bold Commerce spend. Bold is billed as merchant app
  subscriptions, not as a metered API product. The dominant cost drivers are a
  recurring per-app software fee (for example, Bold Subscriptions at a monthly
  tier) plus a percentage transaction fee charged on each processed order that
  contains a subscription product, and, for Bold Memberships, a member-count
  tier plus a 1% fee on top of Stripe processing. Bold Checkout and Bold Price
  Rules are generally bundled into platform / headless commerce agreements.
  Because the transaction fee scales with subscription order volume, GMV growth
  directly increases Bold spend.
notes: >-
  Per-unit rates are grounded from Bold's public pricing pages but not
  reconciled here; verify current tiers and transaction-fee percentages on
  boldcommerce.com. Payment processing (for example, Stripe) is a separate
  charge from a different invoice issuer.
