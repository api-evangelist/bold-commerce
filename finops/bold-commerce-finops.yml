meters:
- name: app_subscription_fee
  description: Recurring monthly software fee for a Bold app tier (for example, Bold Subscriptions).
  unit: months
  aggregation: sum
  dimensions:
  - shop
  - app
  - plan
- name: subscription_transaction_fee
  description: Percentage fee charged on each processed order containing a subscription product.
  unit: orders
  aggregation: sum
  dimensions:
  - shop
  - plan
- name: membership_tier_fee
  description: Bold Memberships monthly fee based on active member-count tier.
  unit: members
  aggregation: max
  dimensions:
  - shop
  - tier
principles:
- name: Visibility
  description: Track the per-app monthly fee plus the transaction fee against subscription order volume (GMV) per shop.
- name: Allocation
  description: Map each Bold app subscription and its transaction fees to the store / brand / team that owns it.
- name: Optimization
  description: Choose the plan tier whose transaction-fee percentage best matches your subscription GMV; higher tiers trade a larger monthly fee for a lower per-order percentage.
- name: Accountability
  description: Review monthly Bold invoices against subscription revenue so the effective take-rate stays understood as volume grows.
